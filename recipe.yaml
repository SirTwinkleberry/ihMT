schema_version: 1

context:
  version: "0.9.1"
  python_min: "3.9"
  name: ihmt

package:
  name: ihmt
  version: ${{ version }}

source:
  url: file:///mnt/c/Users/timya/Documents/Cloud/Nextcloud/Backup/git/ihmt/dist/ihmt-0.9.1.tar.gz
  sha256: b377203375b585823b558698b91b81b755e991217e099b3c140af018d3790ceb

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.26
    - pip
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy
    - pyyaml

tests:
  - python:
      imports:
        - ihmt
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Inhomogeneous magnetization transfer simulator for magnetic resonance research.
  license: GPL-3.0-only
  license_file: LICENSE
  homepage: https://github.com/SirTwinkleberry/ihMT

extra:
  recipe-maintainers:
    - SirTwinkleberry
